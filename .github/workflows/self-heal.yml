name: "Self-Heal: AI Failure Analysis"

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  models: read

jobs:
  analyze-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch failure logs
        id: fetch-logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          JOBS_JSON=$(gh api "/repos/$REPO/actions/runs/$RUN_ID/jobs" --jq '.jobs[] | select(.conclusion == "failure")')

          if [ -z "$JOBS_JSON" ]; then
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_failures=true" >> "$GITHUB_OUTPUT"

          FAILED_JOBS=$(gh api "/repos/$REPO/actions/runs/$RUN_ID/jobs" --jq '[.jobs[] | select(.conclusion == "failure") | {id: .id, name: .name}]')
          echo "failed_jobs=$FAILED_JOBS" >> "$GITHUB_OUTPUT"

          rm -f /tmp/failure_logs.txt
          for JOB_ID in $(echo "$FAILED_JOBS" | jq -r '.[].id'); do
            echo "=== JOB $JOB_ID LOGS ===" >> /tmp/failure_logs.txt
            gh api "/repos/$REPO/actions/jobs/$JOB_ID/logs" 2>/dev/null | tail -200 >> /tmp/failure_logs.txt
          done

          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          COMMIT_MSG=$(gh api "/repos/$REPO/commits/$COMMIT_SHA" --jq '.commit.message' 2>/dev/null || echo "N/A")
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: AI-powered root cause analysis
        if: steps.fetch-logs.outputs.has_failures == 'true'
        id: ai-analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_JOBS: ${{ steps.fetch-logs.outputs.failed_jobs }}
          COMMIT_MSG: ${{ steps.fetch-logs.outputs.commit_msg }}
          BRANCH: ${{ steps.fetch-logs.outputs.branch }}
        run: |
          LOGS=$(head -c 12000 /tmp/failure_logs.txt)

          SYSTEM_PROMPT='You are an expert CI/CD engineer and debugging assistant. You analyze GitHub Actions failure logs and provide clear, actionable root cause analysis. Be concise and specific.'

          {
            echo "A CI pipeline has failed. Analyze the following and provide:"
            echo ""
            echo "1. **Root Cause**: What exactly failed and why (1-2 sentences)"
            echo "2. **Error Category**: One of [dependency_issue, test_failure, lint_error, build_error, config_error, timeout, infra_flake]"
            echo "3. **Suggested Fix**: Specific code or config changes to resolve the issue"
            echo "4. **Auto-fixable**: yes or no"
            echo "5. **Severity**: low / medium / high / critical"
            echo ""
            echo "Branch: $BRANCH"
            echo "Commit Message: $COMMIT_MSG"
            echo "Failed Jobs: $FAILED_JOBS"
            echo ""
            echo "Failure Logs:"
            echo "$LOGS"
          } > /tmp/user_prompt.txt
          USER_PROMPT=$(cat /tmp/user_prompt.txt)

          RESPONSE=$(jq -n --arg system "$SYSTEM_PROMPT" --arg user "$USER_PROMPT" '{model: "openai/gpt-4o-mini", messages: [{role: "system", content: $system}, {role: "user", content: $user}], temperature: 0.3, max_tokens: 1500}' | \
            curl -s -X POST "https://models.github.ai/inference/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -d @-)

          AI_ANALYSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI analysis failed."')
          printf '%s\n' "$AI_ANALYSIS" > /tmp/ai_analysis.txt

          CATEGORY=$(echo "$AI_ANALYSIS" | grep -oP '(?<=\*\*Error Category\*\*:\s)([a-z_]+)' | head -1)
          echo "category=${CATEGORY:-unknown}" >> "$GITHUB_OUTPUT"

          SEVERITY=$(echo "$AI_ANALYSIS" | grep -oiP '(?<=\*\*Severity\*\*:\s)(low|medium|high|critical)' | head -1)
          echo "severity=${SEVERITY:-medium}" >> "$GITHUB_OUTPUT"

          AUTO_FIXABLE=$(echo "$AI_ANALYSIS" | grep -oiP '(?<=\*\*Auto-fixable\*\*:\s)(yes|no)' | head -1)
          echo "auto_fixable=${AUTO_FIXABLE:-no}" >> "$GITHUB_OUTPUT"

          echo "Category: ${CATEGORY}, Auto-fixable: ${AUTO_FIXABLE}"

      - name: Create diagnostic issue
        if: steps.fetch-logs.outputs.has_failures == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          CATEGORY: ${{ steps.ai-analysis.outputs.category }}
          SEVERITY: ${{ steps.ai-analysis.outputs.severity }}
          AUTO_FIXABLE: ${{ steps.ai-analysis.outputs.auto_fixable }}
          BRANCH: ${{ steps.fetch-logs.outputs.branch }}
          COMMIT_SHA: ${{ steps.fetch-logs.outputs.commit_sha }}
          COMMIT_MSG: ${{ steps.fetch-logs.outputs.commit_msg }}
        run: |
          AI_ANALYSIS=$(cat /tmp/ai_analysis.txt)
          RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          {
            echo "## AI-Powered CI Failure Analysis"
            echo ""
            echo "Auto-generated by the Self-Healing CI/CD pipeline."
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Branch | $BRANCH |"
            echo "| Commit | $SHORT_SHA |"
            echo "| Commit Message | $COMMIT_MSG |"
            echo "| Failed Run | $RUN_URL |"
            echo "| Severity | $SEVERITY |"
            echo "| Category | $CATEGORY |"
            echo "| Auto-fix | $AUTO_FIXABLE |"
            echo ""
            echo "---"
            echo ""
            echo "## Root Cause Analysis"
            echo ""
            echo "$AI_ANALYSIS"
            echo ""
            echo "---"
            echo "Analyzed by GitHub Models (GPT-4o-mini) - Free Tier - Zero cost"
          } > /tmp/issue_body.txt

          LABELS="ai-diagnosis,ci-failure"
          case "$SEVERITY" in
            critical) LABELS="$LABELS,priority:critical" ;;
            high)     LABELS="$LABELS,priority:high" ;;
            medium)   LABELS="$LABELS,priority:medium" ;;
            low)      LABELS="$LABELS,priority:low" ;;
          esac

          gh issue create \
            --title "CI Failure: [$CATEGORY] on $BRANCH - $SHORT_SHA" \
            --body-file /tmp/issue_body.txt \
            --label "$LABELS" || \
          gh issue create \
            --title "CI Failure: [$CATEGORY] on $BRANCH - $SHORT_SHA" \
            --body-file /tmp/issue_body.txt

          echo "Diagnostic issue created."

      - name: Auto-fix lint errors
        if: |
          steps.fetch-logs.outputs.has_failures == 'true' &&
          steps.ai-analysis.outputs.category == 'lint_error'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.fetch-logs.outputs.branch }}
          COMMIT_SHA: ${{ steps.fetch-logs.outputs.commit_sha }}
        run: |
          FIX_BRANCH="auto-fix/lint-${COMMIT_SHA:0:7}-$(date +%s)"

          git config user.name "Self-Healing CI Bot"
          git config user.email "ci-bot@self-healing.ai"

          git checkout -b "$FIX_BRANCH" "$COMMIT_SHA"

          npm ci --silent
          npx eslint src/ __tests__/ --fix || true

          if git diff --quiet; then
            echo "No auto-fixable lint errors found."
            exit 0
          fi

          git add -A
          git commit -m "fix(lint): auto-fix lint errors [self-healing-ci bot]"
          git push origin "$FIX_BRANCH"

          {
            echo "## Automated Lint Fix"
            echo ""
            echo "This PR was automatically generated by the Self-Healing CI/CD pipeline."
            echo ""
            echo "**Commit that failed:** ${COMMIT_SHA:0:7}"
            echo ""
            echo "**Action taken:** Ran eslint --fix on src/ and __tests__/ directories."
            echo ""
            echo "Please review before merging."
          } > /tmp/pr_body.txt

          gh pr create \
            --title "Auto-fix: Lint errors on $BRANCH [${COMMIT_SHA:0:7}]" \
            --body-file /tmp/pr_body.txt \
            --base "$BRANCH" \
            --head "$FIX_BRANCH"

          echo "Auto-fix PR opened for lint errors."

      - name: Auto-fix dependency issues
        if: |
          steps.fetch-logs.outputs.has_failures == 'true' &&
          steps.ai-analysis.outputs.category == 'dependency_issue'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.fetch-logs.outputs.branch }}
          COMMIT_SHA: ${{ steps.fetch-logs.outputs.commit_sha }}
        run: |
          FIX_BRANCH="auto-fix/deps-${COMMIT_SHA:0:7}-$(date +%s)"

          git config user.name "Self-Healing CI Bot"
          git config user.email "ci-bot@self-healing.ai"

          git checkout -b "$FIX_BRANCH" "$COMMIT_SHA"

          rm -f package-lock.json
          npm install --silent

          if git diff --quiet; then
            echo "No lockfile changes detected."
            exit 0
          fi

          git add package-lock.json package.json
          git commit -m "fix(deps): regenerate lockfile [self-healing-ci bot]"
          git push origin "$FIX_BRANCH"

          {
            echo "## Automated Dependency Fix"
            echo ""
            echo "Auto-generated by the Self-Healing CI/CD pipeline."
            echo ""
            echo "**Action taken:** Regenerated package-lock.json via npm install."
            echo ""
            echo "Please review before merging."
          } > /tmp/pr_body_deps.txt

          gh pr create \
            --title "Auto-fix: Dependency issues on $BRANCH [${COMMIT_SHA:0:7}]" \
            --body-file /tmp/pr_body_deps.txt \
            --base "$BRANCH" \
            --head "$FIX_BRANCH"

          echo "Auto-fix PR opened for dependency issues."